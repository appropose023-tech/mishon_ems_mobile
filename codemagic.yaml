workflows:
  build_app:
    name: Universal Flutter Builder
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:

      # ----------------------------------------------------
      # 1. BACKUP REPO FILES
      # ----------------------------------------------------
      - name: Backup repository
        script: |
          echo ">>> Backing up repository files..."
          mkdir -p /tmp/repo
          rsync -av ./ /tmp/repo/ \
            --exclude ".git" \
            --exclude "build" \
            --exclude ".dart_tool"

          echo ">>> Cleaning workspace..."
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} \;

      # ----------------------------------------------------
      # 2. CREATE FRESH FLUTTER PROJECT
      # ----------------------------------------------------
      - name: Scaffold Flutter project
        script: |
          echo ">>> Creating fresh Flutter project..."
          flutter create --project-name mishon_aoi_inspector --platforms=android .

      # ----------------------------------------------------
      # 3. RESTORE LIB + PUBSPEC
      # ----------------------------------------------------
      - name: Restore app source files
        script: |
          echo ">>> Restoring lib folder..."
          rm -rf lib
          cp -R /tmp/repo/lib ./lib

          echo ">>> Restoring pubspec.yaml if exists..."
          if [ -f /tmp/repo/pubspec.yaml ]; then
            cp /tmp/repo/pubspec.yaml ./pubspec.yaml
          fi

          flutter pub get

      # ----------------------------------------------------
      # 4. APPLY ANDROID OVERRIDES
      # ----------------------------------------------------
      - name: Apply Android overrides
        script: |
          echo ">>> Applying Android override files..."

          # AndroidManifest.xml
          if [ -f "/tmp/repo/android_overrides/app/src/main/AndroidManifest.xml" ]; then
            echo ">>> Copying AndroidManifest.xml"
            cp /tmp/repo/android_overrides/app/src/main/AndroidManifest.xml \
               android/app/src/main/AndroidManifest.xml
          fi

          # RES folder including xml/network_security_config.xml
          if [ -d "/tmp/repo/android_overrides/app/src/main/res" ]; then
            echo ">>> Copying RES folder"
            rsync -av /tmp/repo/android_overrides/app/src/main/res/ \
               android/app/src/main/res/
          fi

      # ----------------------------------------------------
      # 5. BUILD ANDROID APK
      # ----------------------------------------------------
      - name: Build APK
        script: |
          echo ">>> Building APK..."
          flutter pub get
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
