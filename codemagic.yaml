# Codemagic Continuous Integration Engine Pipeline Matrix
workflows:
  android-release-build:
    name: Mishon EMS Android Release APK Compiler
    max_build_duration: 30
    instance_type: linux 
    
    environment:
      flutter: stable
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - main
        - master

    scripts:
      - name: Initialize Android Local Execution Properties Mapping
        script: | 
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Validate System Packages and Pull Dependencies
        script: |
          flutter pub get

      - name: Validate Framework Integrity Code Check
        script: |
          flutter analyze --fatal-infos --fatal-warnings

      - name: Execute Android Target Pipeline Compilation
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - appropose023@gmail.com
        notify:
          success: true
          failure: true
