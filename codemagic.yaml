workflows:
  android-release-build:
    name: Mishon EMS Android Release APK Compiler
    max_build_duration: 30
    instance_type: mac_mini_m2 # Required for Codemagic's free plan allocation
    working_directory: mishon_ems_mobile # Tells Codemagic to execute all scripts inside this subdirectory
    
    environment:
      flutter: stable
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'

    scripts:
      - name: Initialize Android Local Execution Properties Mapping
        script: | 
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Validate System Packages and Pull Dependencies
        script: |
          flutter pub get

      - name: Validate Framework Integrity Code Check
        script: |
          flutter analyze --fatal-infos --fatal-warnings

      - name: Execute Android Target Pipeline Compilation
        script: |
          flutter build apk --release

    artifacts:
      # Wrapped in single quotes to resolve the YAML parser alias conflict
      - '**/build/app/outputs/flutter-apk/*.apk'

    publishing:
      email:
        recipients:
          - appropose023@gmail.com
        notify:
          success: true
          failure: true
