workflows:
  android-release-build:
    name: Mishon EMS Android Release APK Compiler
    instance_type: mac_mini_m2
    max_build_duration: 30

    environment:
      flutter: stable
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'

    scripts:
      # ----------------------------------------------------
      # 1. BACKUP REPO SOURCE FILES DYNAMICALLY
      # ----------------------------------------------------
      - name: Backup repository
        script: |
          echo ">>> Locating and archiving working application state..."
          mkdir -p /tmp/repo/lib
          
          REAL_LIB_DIR=$(find . -type d -name "lib" | grep -v "node_modules" | head -n 1)
          REAL_PUBSPEC=$(find . -type f -name "pubspec.yaml" | head -n 1)
          
          if [ -n "$REAL_LIB_DIR" ]; then
            echo "Found lib folder at: $REAL_LIB_DIR"
            cp -R "$REAL_LIB_DIR/"* /tmp/repo/lib/
          else
            echo "CRITICAL: lib folder not found in repository!"
            exit 1;
          fi
          
          if [ -n "$REAL_PUBSPEC" ]; then
            echo "Found pubspec.yaml at: $REAL_PUBSPEC"
            cp "$REAL_PUBSPEC" /tmp/repo/pubspec.yaml
          else
            echo "CRITICAL: pubspec.yaml not found in repository!"
            exit 1;
          fi

          echo ">>> Purging local workspace to remove corrupted files..."
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} \;

      # ----------------------------------------------------
      # 2. SCAFFOLD FRESH MODERN ANDROID PIPELINE
      # ----------------------------------------------------
      - name: Scaffold Flutter project
        script: |
          echo ">>> Generating flawless modern Android container structure..."
          # Force a clean, standard base package naming structure
          flutter create --project-name mishon_ems_mobile --org com.mishon --platforms=android .

      # ----------------------------------------------------
      # 3. RESTORE SOURCE FILES AND AUTO-RESOLVE IMPORTS
      # ----------------------------------------------------
      - name: Restore app source files
        script: |
          echo ">>> Merging enterprise UI files and engine layers..."
          rm -rf lib
          cp -R /tmp/repo/lib ./lib

          echo ">>> Restoring production pubspec configuration file..."
          if [ -f /tmp/repo/pubspec.yaml ]; then
            cp /tmp/repo/pubspec.yaml ./pubspec.yaml
          fi

          echo ">>> Auto-injecting missing state engine imports across components..."
          if [ -f "lib/main.dart" ]; then
            sed -i '1s/^/import '\''app_state.dart'\'';\n/' lib/main.dart
          fi

          find lib/screens/ -name "*.dart" -exec sed -i '1s/^/import '\''..\/app_state.dart'\'';\n/' {} \;

          flutter pub get

      # ----------------------------------------------------
      # 4. INJECT NETWORK EXCEPTIONS & LOCK DOWN LAUNCHER ACTIVITY
      # ----------------------------------------------------
      - name: Inject Production Manifest and Cleartext Exceptions
        script: |
          echo ">>> Creating clean, explicit Android source directories..."
          rm -rf android/app/src/main/kotlin
          mkdir -p android/app/src/main/kotlin/com/mishon/ems
          mkdir -p android/app/src/main/res/xml

          echo ">>> Forcing structural sync on MainActivity code layout..."
          cat << 'EOF' > android/app/src/main/kotlin/com/mishon/ems/MainActivity.kt
          package com.mishon.ems
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }
          EOF

          echo ">>> Writing cleartext routing permissions for cloud VM infrastructure..."
          cat << 'EOF' > android/app/src/main/res/xml/network_security_config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">127.0.0.1</domain>
                  <domain includeSubdomains="true">localhost</domain>
                  <domain includeSubdomains="true">104.154.76.47</domain>
              </domain-config>
          </network-security-config>
          EOF

          echo ">>> Injecting locked-down v2 Manifest mapped directly to com.mishon.ems.MainActivity..."
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.mishon.ems">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Mishon EMS"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:networkSecurityConfig="@xml/network_security_config">
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                  <activity
                      android:name="com.mishon.ems.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # ----------------------------------------------------
      # 5. EXECUTE COMPILATION
      # ----------------------------------------------------
      - name: Build APK
        script: |
          echo ">>> Initiating release build generation..."
          flutter pub get
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - appropose023@gmail.com
        notify:
          success: true
          failure: true
