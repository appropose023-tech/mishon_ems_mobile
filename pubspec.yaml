name: Mishon_aoi_inspector
description: PCB camera inspector app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Required by your project
  camera: ^0.10.5
  http: ^1.2.0
  image_picker: ^1.1.2
  image_cropper: ^12.1.0
  path: ^1.8.3
  path_provider: ^2.1.0

  # Optional, but Flutter adds these by default
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
